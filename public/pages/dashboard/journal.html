<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal - BabyTrack</title>
    <link rel="stylesheet" href="/public/css/style.css">
    <script src="/public/js/app.js"></script>
    <script src="/public/js/sidebar.js"></script>
</head>
<body data-page="journal">
    <div id="navbar"></div>
    <div class="layout-container">
        <aside id="sidebar"></aside>
        <main class="container">
            <div class="page-header"><h1>📓 Baby Journal</h1></div>
            <div class="form-card">
                <h3>New Entry</h3>
                <form id="journal-form">
                    <div class="input-group"><label>Date</label><input type="date" id="journal-date" required></div>
                    <div class="input-group"><label>Content</label><textarea id="journal-content" rows="5" required></textarea></div>
                    <button type="submit" class="btn-primary">Save Entry</button>
                </form>
            </div>
            <div class="data-section"><h3>Past Entries</h3><ul id="journal-list" class="data-list"></ul></div>
        </main>
    </div>
    <script>
        (function() {
            const session = window.Storage.getSession();
            const email = session ? session.email : '';
            function getKey(key) { return `${key}_${email}`; }
            function load(key) { return JSON.parse(localStorage.getItem(getKey(key)) || '[]'); }
            function save(key, data) { localStorage.setItem(getKey(key), JSON.stringify(data)); }
            const form = document.getElementById('journal-form');
            const list = document.getElementById('journal-list');
            function render() {
                const entries = load('journal_entries');
                list.innerHTML = entries.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e => `
                    <li class="data-item">
                        <strong>📅 ${new Date(e.date).toLocaleDateString()}</strong><br>
                        ${e.content.replace(/\n/g,'<br>')}
                        <br><button class="delete-entry" data-id="${e.id}" style="background:#ffcdd2;">Delete</button>
                    </li>
                `).join('') || '<li class="empty-state">No journal entries.</li>';
                document.querySelectorAll('.delete-entry').forEach(btn => {
                    btn.onclick = () => {
                        let entries = load('journal_entries');
                        entries = entries.filter(e => e.id != btn.dataset.id);
                        save('journal_entries', entries);
                        render();
                    };
                });
            }
            form.onsubmit = (e) => {
                e.preventDefault();
                const entries = load('journal_entries');
                entries.push({
                    id: Date.now(),
                    date: document.getElementById('journal-date').value,
                    content: document.getElementById('journal-content').value
                });
                save('journal_entries', entries);
                render();
                form.reset();
                alert('Saved!');
            };
            render();
        })();
    </script>
    <script src="/public/js/app.js"></script>
    <script src="/public/js/sidebar.js"></script>
</body>
</html>
