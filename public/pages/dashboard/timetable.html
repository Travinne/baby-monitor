<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Timetable - BabyTrack</title>
    <link rel="stylesheet" href="/public/css/style.css">
    <script src="/public/js/app.js"></script>
    <script src="/public/js/sidebar.js"></script>
</head>
<body data-page="timetable">
    <div id="navbar"></div>
    <div class="layout-container">
        <aside id="sidebar"></aside>
        <main class="container">
            <div class="page-header">
                <h1>📅 Calendar & Timetable</h1>
            </div>

            <div class="form-card">
                <h3>➕ Add Custom Reminder</h3>
                <form id="reminder-form">
                    <div class="input-group">
                        <label>Title</label>
                        <input type="text" id="reminder-title" required>
                    </div>
                    <div class="input-group">
                        <label>Date & Time</label>
                        <input type="datetime-local" id="reminder-datetime" required>
                    </div>
                    <div class="input-group">
                        <label>Notes</label>
                        <textarea id="reminder-notes" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Set Reminder</button>
                </form>
            </div>

            <div class="calendar-nav" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;">
                <div>
                    <button id="prev-month" class="btn-outline">← Prev</button>
                    <button id="next-month" class="btn-outline">Next →</button>
                    <button id="today-btn" class="btn-outline">Today</button>
                </div>
                <div>
                    <button id="year-down" class="btn-outline">- Year</button>
                    <span id="current-month-year" style="font-weight: bold; padding: 0 1rem;"></span>
                    <button id="year-up" class="btn-outline">+ Year</button>
                </div>
            </div>

            <div class="calendar-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; background: rgba(255,255,255,0.5); backdrop-filter: blur(4px); border-radius: var(--radius-lg); padding: 1rem;">
                <div class="cal-weekday" style="font-weight: bold; text-align: center; padding: 0.5rem;">Sun</div>
                <div class="cal-weekday" style="font-weight: bold; text-align: center; padding: 0.5rem;">Mon</div>
                <div class="cal-weekday" style="font-weight: bold; text-align: center; padding: 0.5rem;">Tue</div>
                <div class="cal-weekday" style="font-weight: bold; text-align: center; padding: 0.5rem;">Wed</div>
                <div class="cal-weekday" style="font-weight: bold; text-align: center; padding: 0.5rem;">Thu</div>
                <div class="cal-weekday" style="font-weight: bold; text-align: center; padding: 0.5rem;">Fri</div>
                <div class="cal-weekday" style="font-weight: bold; text-align: center; padding: 0.5rem;">Sat</div>
                <div id="calendar-days" style="grid-column: span 7; display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem;"></div>
            </div>

            <div class="data-section" style="margin-top: 2rem;">
                <h3>📋 Events for <span id="selected-date-label"></span></h3>
                <div id="daily-timeline" class="timeline-container"></div>
            </div>
        </main>
    </div>

    <script>
        (function() {
            let currentDate = new Date();
            let selectedDate = new Date();

            function formatDateKey(d) {
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }

            function getSessionEmail() {
                const session = window.Storage.getSession();
                return session ? session.email : '';
            }

            function getKey(k) {
                const email = getSessionEmail();
                return `${k}_${email}`;
            }

            function loadData(key) {
                return JSON.parse(localStorage.getItem(getKey(key)) || '[]');
            }

            function saveData(key, data) {
                localStorage.setItem(getKey(key), JSON.stringify(data));
            }

            function getHealth() {
                return window.Storage.getHealth();
            }

            function getAllEvents() {
                const events = [];
                const email = getSessionEmail();
                if (!email) return events;

                loadData('sleep_logs').forEach(l => {
                    events.push({ date: l.start.slice(0,10), datetime: l.start, title: '😴 Sleep start', detail: `Until ${new Date(l.end).toLocaleString()}` });
                    events.push({ date: l.end.slice(0,10), datetime: l.end, title: '😴 Sleep end', detail: `From ${new Date(l.start).toLocaleString()}` });
                });
                loadData('feeding_logs').forEach(f => {
                    events.push({ date: f.time.slice(0,10), datetime: f.time, title: `🍼 Feeding: ${f.type}`, detail: f.amount || '' });
                });
                loadData('diaper_logs').forEach(d => {
                    events.push({ date: d.time.slice(0,10), datetime: d.time, title: `🧷 Diaper: ${d.type}`, detail: d.notes || '' });
                });
                const health = getHealth();
                health.temperature.forEach(t => {
                    events.push({ date: t.datetime.slice(0,10), datetime: t.datetime, title: `🌡️ ${t.value}°C`, detail: `${t.method} — ${t.notes||''}` });
                });
                health.teething.forEach(t => {
                    events.push({ date: t.eruptionDate, datetime: t.eruptionDate, title: `🦷 Tooth: ${t.toothName}`, detail: t.symptoms || '' });
                });
                health.vaccinations.forEach(v => {
                    if (v.dueDate) events.push({ date: v.dueDate, datetime: v.dueDate, title: `💉 Vaccine due: ${v.name}`, detail: v.notes });
                    if (v.administeredDate) events.push({ date: v.administeredDate, datetime: v.administeredDate, title: `💉 Vaccine given: ${v.name}`, detail: '' });
                });
                loadData('custom_reminders').forEach(r => {
                    const dt = r.datetime.slice(0,16);
                    events.push({ date: dt.slice(0,10), datetime: dt, title: `⏰ ${r.title}`, detail: r.notes });
                });
                const dentistReminder = localStorage.getItem(getKey('dentist_reminder'));
                if (dentistReminder) {
                    events.push({ date: dentistReminder, datetime: dentistReminder, title: '🦷 Dentist visit', detail: 'Reminder' });
                }
                events.sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
                return events;
            }

            function getEventsForDate(dateStr) {
                const all = getAllEvents();
                return all.filter(e => e.date === dateStr);
            }

            function renderCalendar() {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDayOfMonth = new Date(year, month, 1);
                const startWeekday = firstDayOfMonth.getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                const container = document.getElementById('calendar-days');
                if (!container) return;
                container.innerHTML = '';

                for (let i = 0; i < startWeekday; i++) {
                    const empty = document.createElement('div');
                    empty.className = 'cal-day empty';
                    empty.style.background = 'rgba(255,255,255,0.3)';
                    empty.style.borderRadius = 'var(--radius-md)';
                    empty.style.padding = '0.5rem';
                    empty.style.textAlign = 'center';
                    container.appendChild(empty);
                }

                const todayStr = formatDateKey(new Date());
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(year, month, d);
                    const dateStr = formatDateKey(dateObj);
                    const eventsToday = getEventsForDate(dateStr);
                    const hasEvents = eventsToday.length > 0;
                    const isSelected = (selectedDate.getFullYear() === year && selectedDate.getMonth() === month && selectedDate.getDate() === d);
                    const isToday = (dateStr === todayStr);

                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'cal-day';
                    dayDiv.style.background = isSelected ? 'var(--primary-light)' : (hasEvents ? 'rgba(139,116,255,0.15)' : 'white');
                    dayDiv.style.borderRadius = 'var(--radius-md)';
                    dayDiv.style.padding = '0.5rem';
                    dayDiv.style.textAlign = 'center';
                    dayDiv.style.cursor = 'pointer';
                    dayDiv.style.fontWeight = isToday ? 'bold' : 'normal';
                    dayDiv.style.border = isToday ? '2px solid var(--primary)' : '1px solid var(--gray-200)';
                    dayDiv.innerHTML = `<div style="font-size: 1rem;">${d}</div>${hasEvents ? '<div style="font-size: 0.7rem; color: var(--primary);">●</div>' : '<div style="height: 1rem;"></div>'}`;
                    dayDiv.addEventListener('click', (function(dd) { return function() { selectDate(new Date(year, month, dd)); }; })(d));
                    container.appendChild(dayDiv);
                }

                document.getElementById('current-month-year').innerText = `${firstDayOfMonth.toLocaleString('default', { month: 'long' })} ${year}`;
            }

            function selectDate(date) {
                selectedDate = date;
                renderCalendar();
                renderDailyTimeline();
            }

            function renderDailyTimeline() {
                const dateStr = formatDateKey(selectedDate);
                document.getElementById('selected-date-label').innerText = new Date(dateStr).toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const events = getEventsForDate(dateStr);
                const timelineDiv = document.getElementById('daily-timeline');
                if (!timelineDiv) return;
                if (events.length === 0) {
                    timelineDiv.innerHTML = '<div class="empty-state">No events on this day.</div>';
                    return;
                }
                let html = '';
                let lastHour = '';
                events.forEach(e => {
                    const timeStr = new Date(e.datetime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    const hour = new Date(e.datetime).getHours();
                    if (lastHour !== hour) {
                        if (lastHour !== '') html += '</div>';
                        html += `<div class="timeline-hour" style="margin-top: 1rem;"><strong style="background: var(--primary-light); padding: 0.2rem 0.8rem; border-radius: 2rem;">${hour}:00</strong><div style="margin-left: 1rem;">`;
                        lastHour = hour;
                    }
                    html += `<div class="timeline-item" style="margin: 0.5rem 0;"><strong>${timeStr}</strong> — ${e.title}<br><small>${e.detail}</small></div>`;
                });
                html += '</div></div>';
                timelineDiv.innerHTML = html;
            }

            function previousMonth() {
                currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
                renderCalendar();
                if (currentDate.getMonth() !== selectedDate.getMonth() || currentDate.getFullYear() !== selectedDate.getFullYear()) {
                    selectDate(currentDate);
                } else {
                    renderDailyTimeline();
                }
            }

            function nextMonth() {
                currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
                renderCalendar();
                if (currentDate.getMonth() !== selectedDate.getMonth() || currentDate.getFullYear() !== selectedDate.getFullYear()) {
                    selectDate(currentDate);
                } else {
                    renderDailyTimeline();
                }
            }

            function goToday() {
                currentDate = new Date();
                selectedDate = new Date();
                renderCalendar();
                renderDailyTimeline();
            }

            function yearDown() {
                currentDate = new Date(currentDate.getFullYear() - 1, currentDate.getMonth(), 1);
                renderCalendar();
                if (currentDate.getFullYear() !== selectedDate.getFullYear()) {
                    selectDate(currentDate);
                } else {
                    renderDailyTimeline();
                }
            }

            function yearUp() {
                currentDate = new Date(currentDate.getFullYear() + 1, currentDate.getMonth(), 1);
                renderCalendar();
                if (currentDate.getFullYear() !== selectedDate.getFullYear()) {
                    selectDate(currentDate);
                } else {
                    renderDailyTimeline();
                }
            }

            document.getElementById('prev-month')?.addEventListener('click', previousMonth);
            document.getElementById('next-month')?.addEventListener('click', nextMonth);
            document.getElementById('today-btn')?.addEventListener('click', goToday);
            document.getElementById('year-down')?.addEventListener('click', yearDown);
            document.getElementById('year-up')?.addEventListener('click', yearUp);

            const reminderForm = document.getElementById('reminder-form');
            reminderForm?.addEventListener('submit', (e) => {
                e.preventDefault();
                const title = document.getElementById('reminder-title').value;
                const datetime = document.getElementById('reminder-datetime').value;
                const notes = document.getElementById('reminder-notes').value;
                if (!title || !datetime) return;
                const reminders = loadData('custom_reminders');
                reminders.push({
                    id: Date.now(),
                    title,
                    datetime,
                    notes
                });
                saveData('custom_reminders', reminders);
                reminderForm.reset();
                renderCalendar();
                if (formatDateKey(selectedDate) === datetime.slice(0,10)) {
                    renderDailyTimeline();
                }
                alert('Reminder added!');
            });

            renderCalendar();
            selectDate(new Date());
        })();
    </script>
</body>
</html>
