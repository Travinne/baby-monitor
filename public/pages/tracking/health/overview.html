<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Overview - BabyTrack</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="health-overview">
    <div id="navbar"></div>
    <div class="layout-container">
        <aside id="sidebar"></aside>
        <main class="container">
            <div class="page-header">
                <h1>🩺 Health Overview</h1>
                <div class="sub-nav">
                    <a href="/pages/tracking/health/overview.html" class="active">Overview</a>
                    <a href="/pages/tracking/health/appointments.html">Appointments</a>
                    <a href="/pages/tracking/health/medications.html">Medications</a>
                    <a href="/pages/tracking/health/allergies.html">Allergies</a>
                    <a href="/pages/tracking/health/teething.html">Teething</a>
                </div>
            </div>
            <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="stat-card">
                    <h3>Next Appointment</h3>
                    <p id="next-appointment-preview">None scheduled</p>
                </div>
                <div class="stat-card">
                    <h3>Active Medications</h3>
                    <p id="active-medications-count">0</p>
                </div>
            </div>
            <div class="form-card">
                <h3>➕ Add Growth Record</h3>
                <form id="growth-form">
                    <div class="input-group">
                        <label>Height (cm)</label>
                        <input type="number" step="0.1" id="growth-height" required>
                    </div>
                    <div class="input-group">
                        <label>Weight (kg)</label>
                        <input type="number" step="0.1" id="growth-weight" required>
                    </div>
                    <button type="submit" class="btn-primary">Save Growth</button>
                </form>
            </div>
            <div class="data-section">
                <h3>📈 Growth History</h3>
                <ul id="growth-list" class="data-list"></ul>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
