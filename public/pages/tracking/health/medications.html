<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medications & Vaccines - BabyTrack</title>
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body data-page="health-medications">
    <div id="navbar"></div>
    <div class="layout-container">
        <aside id="sidebar"></aside>
        <main class="container">
            <div class="page-header">
                <h1>💊 Medications & Vaccines</h1>
                <div class="sub-nav">
                    <a href="/public/pages/tracking/health/overview.html">Overview</a>
                    <a href="/public/pages/tracking/health/appointments.html">Appointments</a>
                    <a href="/public/pages/tracking/health/medications.html" class="active">Medications</a>
                    <a href="/public/pages/tracking/health/allergies.html">Allergies</a>
                    <a href="/public/pages/tracking/health/teething.html">Teething</a>
                </div>
            </div>
            <div class="form-card">
                <h3>🌡️ Fever Guide</h3>
                <div class="temp-normal">✅ Normal: 36.5–37.2°C</div>
                <div class="temp-warning" style="margin-top: 0.5rem;">⚠️ Low fever: 37.3–38.0°C – monitor</div>
                <div class="temp-critical" style="margin-top: 0.5rem;">🔥 High fever: >38.0°C – seek medical attention</div>
                <button id="emergency-btn" class="btn-danger" style="margin-top: 1rem;">🚑 Emergency → Book Appointment</button>
            </div>
            <div class="form-card">
                <h3>📝 Log Temperature</h3>
                <form id="temp-form">
                    <div class="input-group">
                        <label>Date & Time</label>
                        <input type="datetime-local" id="temp-datetime" required>
                    </div>
                    <div class="input-group">
                        <label>Temperature (°C)</label>
                        <input type="number" step="0.1" id="temp-value" required>
                    </div>
                    <div class="input-group">
                        <label>Method</label>
                        <select id="temp-method">
                            <option>Forehead</option>
                            <option>Ear</option>
                            <option>Armpit</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Notes</label>
                        <textarea id="temp-notes" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Add Temperature</button>
                </form>
                <ul id="temp-list" class="data-list" style="margin-top: 1rem;"></ul>
            </div>
            <div class="form-card">
                <h3>💊 Add Medication</h3>
                <form id="med-form">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" id="med-name" required>
                    </div>
                    <div class="input-group">
                        <label>Dosage</label>
                        <input type="text" id="med-dosage" required>
                    </div>
                    <div class="input-group">
                        <label>Frequency</label>
                        <input type="text" id="med-frequency" required>
                    </div>
                    <button type="submit" class="btn-primary">Add Medication</button>
                </form>
                <ul id="med-list" class="data-list" style="margin-top: 1rem;"></ul>
            </div>
            <div class="form-card">
                <h3>💉 Vaccination Schedule</h3>
                <form id="vaccine-form">
                    <div class="input-group">
                        <label>Vaccine Name</label>
                        <input type="text" id="vaccine-name" required>
                    </div>
                    <div class="input-group">
                        <label>Due Date</label>
                        <input type="date" id="vaccine-due" required>
                    </div>
                    <div class="input-group">
                        <label>Administered Date (if done)</label>
                        <input type="date" id="vaccine-admin">
                    </div>
                    <div class="input-group">
                        <label>Notes</label>
                        <textarea id="vaccine-notes" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Add Vaccine</button>
                </form>
                <ul id="vaccine-list" class="data-list" style="margin-top: 1rem;"></ul>
            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
