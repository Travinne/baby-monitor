<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - BabyTrack</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="health-appointments">
    <div id="navbar"></div>
    <div class="layout-container">
        <aside id="sidebar"></aside>
        <main class="container">
            <div class="page-header">
                <h1>📅 Medical Appointments</h1>
                <div class="sub-nav">
                    <a href="/pages/tracking/health/overview.html">Overview</a>
                    <a href="/pages/tracking/health/appointments.html" class="active">Appointments</a>
                    <a href="/pages/tracking/health/medications.html">Medications</a>
                    <a href="/pages/tracking/health/allergies.html">Allergies</a>
                    <a href="/pages/tracking/health/teething.html">Teething</a>
                </div>
            </div>
            <div class="form-card">
                <h3>Schedule New Appointment</h3>
                <form id="appointment-form">
                    <div class="input-group">
                        <label>Doctor Name</label>
                        <input type="text" id="doctor-name" required>
                    </div>
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="appointment-date" required>
                    </div>
                    <div class="input-group">
                        <label>Time</label>
                        <input type="time" id="appointment-time" required>
                    </div>
                    <button type="submit" class="btn-primary">Add Appointment</button>
                </form>
            </div>
            <div class="data-section">
                <h3>Upcoming & Past Appointments</h3>
                <ul id="appointment-list" class="data-list"></ul>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
