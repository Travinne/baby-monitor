<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sleep Tracker - BabyTrack</title>
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body data-page="sleep">
    <div id="navbar"></div>
    <div class="layout-container">
        <aside id="sidebar"></aside>
        <main class="container">
            <div class="page-header">
                <h1>💤 Sleep Tracker</h1>
            </div>
            <div class="form-card">
                <h3>📝 Log Sleep Session</h3>
                <form id="tracker-form">
                    <div class="input-group">
                        <label>Start Time</label>
                        <input type="datetime-local" id="start-time" required>
                    </div>
                    <div class="input-group">
                        <label>End Time</label>
                        <input type="datetime-local" id="end-time" required>
                    </div>
                    <div class="input-group">
                        <label>Notes</label>
                        <textarea id="notes" rows="2" placeholder="Any interruptions, location..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary">➕ Add Sleep Record</button>
                </form>
            </div>
            <div class="data-section">
                <h3>📋 Recent Sleep Logs</h3>
                <ul id="logs-list" class="data-list"></ul>
            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
