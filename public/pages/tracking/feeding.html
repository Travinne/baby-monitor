<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Feeding Tracker - BabyTrack</title>
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body data-page="feeding">
    <div id="navbar"></div>
    <div class="layout-container">
        <aside id="sidebar"></aside>
        <main class="container">
            <div class="page-header">
                <h1>🍼 Feeding Log</h1>
            </div>
            <div class="form-card">
                <h3>📝 Log Feeding</h3>
                <form id="tracker-form">
                    <div class="input-group">
                        <label>Type</label>
                        <select id="feeding-type" required>
                            <option value="Breastfeeding">Breastfeeding</option>
                            <option value="Bottle (Formula)">Bottle (Formula)</option>
                            <option value="Bottle (Breast Milk)">Bottle (Breast Milk)</option>
                            <option value="Solids">Solids</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Amount</label>
                        <input type="text" id="amount" placeholder="e.g., 4oz, half jar">
                    </div>
                    <div class="input-group">
                        <label>Time</label>
                        <input type="datetime-local" id="feeding-time" required>
                    </div>
                    <div class="input-group">
                        <label>Notes</label>
                        <textarea id="feeding-notes" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">➕ Add Feeding</button>
                </form>
            </div>
            <div class="data-section">
                <h3>📋 Feeding History</h3>
                <ul id="logs-list" class="data-list"></ul>
            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
